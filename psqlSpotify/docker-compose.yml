services:
  spotify-dev-db:
    image: postgres:16.3
    container_name: spotify-dev-db
    ports:
      - "5678:5432"
    restart: always
    environment:
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_USER: postgres
      POSTGRES_DB: spotify_dev # NOTE: Should be the same name as the db_name in .env for main.go
    volumes:
      - ./psqlDbData:/var/lib/postgresql/data
    networks:
      - spotify-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: spotify-pgadmin
    restart: always
    ports:
      - "9081:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: test@mahadi.com
      PGADMIN_DEFAULT_PASSWORD: pgadminpassword
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    networks:
      - spotify-network
    depends_on:
      - spotify-dev-db

networks:
  spotify-network:
    name: spotify-network

volumes:
  pgadmin-data:
